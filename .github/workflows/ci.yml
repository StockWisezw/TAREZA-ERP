name: Tareza ERP CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint

    - name: Type Check
      run: npx tsc --noEmit

    - name: Build Application
      run: npm run build
      env:
        # Dummy values for build process
        VITE_SUPABASE_URL: "https://example.supabase.co"
        VITE_SUPABASE_ANON_KEY: "dummy-key"

  # Netlify usually handles deployment automatically when connected to a GitHub repo.
  # If you prefer manual deployment via GitHub Actions, configure the Netlify CLI steps here.
